<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 420px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 2px solid #333;
      border-radius: 4px;
      background: #f9f9f9;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      box-sizing: border-box;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      padding: 4px 0;
    }
    #status.error { color: #c00; }
    #status.success { color: #080; }
    #response-container {
      margin-top: 12px;
    }
    #response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    #response-label {
      font-weight: 600;
    }
    #copy {
      width: auto;
      padding: 4px 8px;
      margin: 0;
      font-size: 11px;
    }
    #response {
      width: 100%;
      height: 150px;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      box-sizing: border-box;
      background: #f5f5f5;
      border: 1px solid #ccc;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="user-greeting" style="font-size:14px; font-weight:700; margin-bottom:10px; color:#1a6b4a;"></div>
  <label for="profile">Workspace</label>
  <select id="profile"></select>
  <label for="payload">JSON Payload</label>
  <textarea id="payload" placeholder="Paste JSON payload here" autofocus></textarea>
  <button id="send">Send to Qwrk</button>
  <div id="status"></div>
  <div id="response-container">
    <div id="response-header">
      <div id="response-label">Response</div>
      <button id="copy">Copy Response</button>
    </div>
    <div id="response"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
