<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 420px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #fafffe;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #2ecc71;
      font-weight: 700;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      box-sizing: border-box;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea:focus {
      outline: none;
      border-color: #2ecc71;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      font-size: 13px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #send {
      background: #2ecc71;
      color: #fff;
    }
    #send:hover:not(:disabled) {
      background: #27ae60;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      padding: 4px 0;
    }
    #status.error { color: #c00; }
    #status.success { color: #27ae60; }
    #response-container {
      margin-top: 12px;
    }
    #response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    #response-label {
      font-weight: 600;
    }
    #copy {
      width: auto;
      padding: 4px 8px;
      margin: 0;
      font-size: 11px;
      background: #f0f0f0;
      border: 1px solid #ccc;
    }
    #copy:hover {
      background: #e0e0e0;
    }
    #response {
      width: 100%;
      height: 150px;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      box-sizing: border-box;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .workspace-badge {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Qwrk Beta</h1>
  <div class="workspace-badge" id="workspace-badge"></div>
  <label for="payload">JSON Payload</label>
  <textarea id="payload" placeholder="Paste JSON payload here" autofocus></textarea>
  <button id="send">Send to Qwrk</button>
  <div id="status"></div>
  <div id="response-container">
    <div id="response-header">
      <div id="response-label">Response</div>
      <button id="copy">Copy Response</button>
    </div>
    <div id="response"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
